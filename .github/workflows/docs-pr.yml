name: Verify Documentation Build (PR)

on:
  pull_request:
    paths:
      - "documentation/**"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: documentation/package-lock.json

      - name: Install dependencies
        run: |
          cd documentation
          npm ci

      - name: Build documentation site
        run: |
          cd documentation
          npm run build
